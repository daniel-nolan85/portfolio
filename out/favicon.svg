<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#08060F"/>

  <!-- Orbit 1 -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#67E8F9" stroke-width="0.7" stroke-opacity="0.55"/>

  <!-- Orbit 2 -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#94A3B8" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Sun glow -->
  <circle cx="16" cy="16" r="7" fill="#67E8F9" fill-opacity="0.15"/>

  <!-- Sun core -->
  <circle cx="16" cy="16" r="5" fill="#22C5DC"/>

  <!-- Sun highlight -->
  <circle cx="14.5" cy="14.5" r="2.5" fill="rgba(200,248,255,0.3)"/>
  <circle cx="14.8" cy="14.8" r="1.2" fill="rgba(255,255,255,0.5)"/>

  <!-- Planet 1 — cyan, orbit 1 -->
  <circle cx="22" cy="9" r="1.8" fill="#67E8F9"/>

  <!-- Planet 2 — silver, orbit 2 -->
  <circle cx="5" cy="22" r="1.5" fill="#94A3B8"/>
</svg>